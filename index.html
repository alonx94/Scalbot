<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>ScalpBot v7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#080c14;color:#cbd5e1;font-family:'DM Mono','Courier New',monospace;max-width:430px;margin:0 auto;min-height:100vh}
::-webkit-scrollbar{width:0}
button{font-family:'DM Mono','Courier New',monospace;cursor:pointer;border:none}
input{font-family:'DM Mono','Courier New',monospace;outline:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fa{0%{opacity:0;transform:translateY(-10px)}15%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bar{from{width:0}to{width:100%}}
.tog{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.tog.on{background:#4ade80}
.tog.on::after{transform:translateX(16px)}
.tog.off{background:#1e293b}
</style>
</head>
<body>

      <button id="btnCA" style="display:none;background:rgba(239,68,68,.1);border:1px solid #7f1d1d;color:#f87171;border-radius:6px;padding:6px 9px;font-family:'Bebas Neue';font-size:11px;letter-spacing:1px"></button>

<div id="content" style="flex:1;overflow-y:auto;padding:10px 13px 82px"></div>

<!-- NAV -->
<nav style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-top:1px solid #0f172a;display:flex">

</nav>

<script>
// ═══════════════════════════════════════════════
// PROFILS DE RISQUE
// ═══════════════════════════════════════════════
var PROFILES = {
  safe: {
    capital:500, tradeSize:15, tradeSizeNew:5, maxPos:3, maxPosNew:1,
    tp1:.06, tp2:.15, tp3:.35, trail:.03, dump:.06, dumpTicks:3,
    maxMs:180000, maxMsNew:45000,
    minLiq:25000, minAgeSec:600, minScoreNew:4, minDelaySec:60,
    maxVolMcapRatio:2.0, volX:3.0, pumpPct:.015, brkWin:10, minScore:2,
    maxDrawdown:.15, perpLeverage:2, perpSL:.07, perpTP:.10, perpSize:10,
    slippage:100,
    desc:'Filtres stricts, petites positions, stop loss serré. Idéal pour débuter ou en période de marché incertain. Moins de trades mais moins de pertes.'
  },
  balanced: {
    capital:500, tradeSize:25, tradeSizeNew:10, maxPos:4, maxPosNew:2,
    tp1:.08, tp2:.20, tp3:.50, trail:.04, dump:.08, dumpTicks:3,
    maxMs:120000, maxMsNew:60000,
    minLiq:10000, minAgeSec:300, minScoreNew:3, minDelaySec:30,
    maxVolMcapRatio:3.0, volX:2.8, pumpPct:.018, brkWin:8, minScore:2,
    maxDrawdown:.25, perpLeverage:5, perpSL:.10, perpTP:.15, perpSize:20,
    slippage:150,
    desc:'Paramètres optimisés pour le rapport risque/rendement. Recommandé pour la majorité des situations. Score minimum 3/5 sur nouveaux tokens.'
  },
  aggressive: {
    capital:500, tradeSize:50, tradeSizeNew:20, maxPos:6, maxPosNew:3,
    tp1:.10, tp2:.30, tp3:.80, trail:.05, dump:.12, dumpTicks:2,
    maxMs:60000, maxMsNew:30000,
    minLiq:5000, minAgeSec:120, minScoreNew:2, minDelaySec:10,
    maxVolMcapRatio:5.0, volX:2.0, pumpPct:.010, brkWin:5, minScore:1,
    maxDrawdown:.40, perpLeverage:10, perpSL:.15, perpTP:.25, perpSize:50,
    slippage:300,
    desc:'Entrées fréquentes, grandes positions, filtres relâchés. TP élevés mais plus de pertes. Uniquement pour traders expérimentés avec capital dédié.'
  }
};
var currentProfile = 'balanced';
var CFG = Object.assign({}, PROFILES.balanced);
var INIT_CAP = 500;
var MODE = 'sim';

// ═══════════════════════════════════════════════
// TOGGLES — protections activables
// ═══════════════════════════════════════════════
var TOGGLES = {
  useRugcheck:    {label:'Rugcheck.xyz',         desc:'Vérifie le contrat du token',          on:true,  safeDefault:true,  aggDefault:false},
  useHolders:     {label:'Analyse holders',      desc:'Détecte concentration de wallets',     on:true,  safeDefault:true,  aggDefault:false},
  useSentiment:   {label:'Sentiment social',     desc:'Score basé sur Twitter/Telegram',      on:true,  safeDefault:true,  aggDefault:true},
  useDevWallet:   {label:'Dev wallet scan',      desc:'Détecte dump du dev',                  on:true,  safeDefault:true,  aggDefault:false},
  useTA:          {label:'RSI / EMA / MACD',     desc:'Indicateurs techniques',               on:true,  safeDefault:true,  aggDefault:true},
  useTrailSL:     {label:'Trailing Stop Loss',   desc:'SL qui suit le prix',                  on:true,  safeDefault:true,  aggDefault:true},
  useDumpDetect:  {label:'Dump detection',       desc:'Exit si chute rapide',                 on:true,  safeDefault:true,  aggDefault:true},
  useDrawdown:    {label:'Stop drawdown global', desc:'Stoppe le bot si perte max atteinte',  on:true,  safeDefault:true,  aggDefault:true},
  useTPPartial:   {label:'TP partiels',          desc:'Vente progressive à TP1 et TP2',       on:true,  safeDefault:true,  aggDefault:true},
  useNewTokens:   {label:'Nouveaux tokens',      desc:'Scanner Raydium/Pump.fun',             on:true,  safeDefault:false, aggDefault:true},
  usePerps:       {label:'Jupiter Perps',        desc:'Trading avec levier',                  on:false, safeDefault:false, aggDefault:true},
  useBlacklist:   {label:'Blacklist auto',       desc:'Blacklist tokens dangereux',            on:true,  safeDefault:true,  aggDefault:true},
};

// ═══════════════════════════════════════════════
// TOKENS
// ═══════════════════════════════════════════════
var TOKENS = [
  {s:'BONK',  e:'🐕',mint:'DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263',b:0.0000142,v:1.2e9},
  {s:'WIF',   e:'🧢',mint:'EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm',b:2.31,     v:8e7},
  {s:'POPCAT',e:'🐱',mint:'7GCihgDB8fe6KNjn2MYtkzZcRjQy3t9GHdC8uHYmW2hr',b:0.87,     v:3e7},
  {s:'MEW',   e:'🐾',mint:'MEW1gQWJ3nEXg2qgERiKu7FAFj79PHvQVREQUzScPP5', b:0.0089,   v:5e7},
  {s:'BOME',  e:'📖',mint:'ukHH6c7mMyiWCf1b9pnWe25TSpkDDt3H5pQZgZ74J82', b:0.0071,   v:2e7},
];
var USDC = 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v';
var EMOJIS = ['🚀','💎','🔥','⚡','🌙','🐸','🦊','🐻','🦁','🐯','🎯','💥','🌊','🦋','🎪'];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var running=false, curTab='live';
var capital=CFG.capital, positions=[], history=[], market=[];
var newTokens=[], perpPrices={SOL:150,BTC:65000,ETH:3500};
var blacklistMap={};
var snaps=[{v:CFG.capital,t:Date.now()}];
var watchlist=TOKENS.slice();
var stats={w:0,l:0,to:0,du:0,pnl:0};
var tickN=0, botTimer=null, fetchTimer=null, newTimer=null, perpTimer=null;
var walletPk=null, walletBal={sol:0,usdc:0};
var lastNewEntry=0;
var modalCb=null, settingsOpen=false, tmpCfg={}, tmpToggles={};
var rugCache={}, holderCache={}, sentimentCache={}, devCache={};
var backtestResults=null, btRunning=false;

// ═══════════════════════════════════════════════
// PHANTOM
// ═══════════════════════════════════════════════
function getPh(){
  if(window.phantom&&window.phantom.solana) return window.phantom.solana;
  if(window.solana&&window.solana.isPhantom) return window.solana;
  return null;
}
function connectWallet(){
  var ph=getPh();
  if(!ph){showModal('PHANTOM REQUIS','Ouvre cette URL dans le navigateur de l\'app Phantom :\n'+window.location.href,null,'FERMER');return;}
  ph.connect().then(function(r){
    walletPk=r.publicKey.toString(); updateWalletUI(); fetchBal();
    flash('✓ Phantom connecté','#a78bfa');
  }).catch(function(){flash('Annulé','#f87171');});
}
function disconnectWallet(){var ph=getPh();if(ph)ph.disconnect();walletPk=null;walletBal={sol:0,usdc:0};updateWalletUI();}
function updateWalletUI(){
  var i=document.getElementById('walletInfo'),b=document.getElementById('btnW');
  if(walletPk){
    i.innerHTML='<span style="color:#a78bfa">●</span> '+walletPk.slice(0,4)+'...'+walletPk.slice(-4)+' <span style="color:#4ade80">◎'+walletBal.sol.toFixed(3)+'</span> <span style="color:#38bdf8">$'+walletBal.usdc.toFixed(2)+'</span>';
    b.textContent='DÉCO';b.onclick=disconnectWallet;
    b.style.cssText='background:rgba(239,68,68,.08);border:1px solid #7f1d1d;color:#f87171;border-radius:4px;padding:3px 7px;font-size:7px;letter-spacing:1px';
  }else{
    i.textContent='Wallet non connecté';b.textContent='PHANTOM';b.onclick=connectWallet;
    b.style.cssText='background:rgba(147,51,234,.15);border:1px solid #581c87;color:#a78bfa;border-radius:4px;padding:3px 7px;font-size:7px;letter-spacing:1px';
  }
}
function fetchBal(){
  if(!walletPk)return;
  rpc('getBalance',[walletPk,{commitment:'confirmed'}],function(d){if(d.result)walletBal.sol=d.result.value/1e9;updateWalletUI();});
  rpc('getTokenAccountsByOwner',[walletPk,{mint:USDC},{encoding:'jsonParsed',commitment:'confirmed'}],function(d){
    if(d.result&&d.result.value&&d.result.value.length>0)walletBal.usdc=d.result.value[0].account.data.parsed.info.tokenAmount.uiAmount||0;
    updateWalletUI();
  });
}
function rpc(m,p,cb){
  fetch('https://api.mainnet-beta.solana.com',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:m,params:p})})
  .then(function(r){return r.json();}).then(cb).catch(function(){});
}

// ═══════════════════════════════════════════════
// ANALYSES SÉCURITÉ
// ═══════════════════════════════════════════════
function checkRug(mint,cb){
  if(!mint||!TOGGLES.useRugcheck.on){cb({safe:true,score:0,honeypot:false,mintAuth:false,freezeAuth:false});return;}
  if(rugCache[mint]&&Date.now()-rugCache[mint].ts<300000){cb(rugCache[mint]);return;}
  fetch('https://api.rugcheck.xyz/v1/tokens/'+mint+'/report/summary')
  .then(function(r){return r.json();}).then(function(d){
    var risks=(d.risks||[]).map(function(r){return r.name||r;});
    var res={safe:d.score<500&&risks.indexOf('Honeypot')<0,score:d.score||0,
      honeypot:risks.indexOf('Honeypot')>=0||risks.indexOf('honeypot')>=0,
      mintAuth:risks.indexOf('Mint authority enabled')>=0,
      freezeAuth:risks.indexOf('Freeze authority enabled')>=0,ts:Date.now()};
    rugCache[mint]=res; cb(res);
  }).catch(function(){var r={safe:true,score:-1,honeypot:false,mintAuth:false,freezeAuth:false,ts:Date.now()};rugCache[mint]=r;cb(r);});
}

function checkHolders(mint,cb){
  if(!mint||!TOGGLES.useHolders.on){cb({top1pct:0,top10pct:0,safe:true});return;}
  if(holderCache[mint]&&Date.now()-holderCache[mint].ts<300000){cb(holderCache[mint]);return;}
  fetch('https://public-api.solscan.io/token/holders?tokenAddress='+mint+'&limit=10&offset=0',{headers:{'Accept':'application/json'}})
  .then(function(r){return r.json();}).then(function(d){
    var holders=(d.data&&d.data.result)||d.result||[];
    var total=0; for(var i=0;i<holders.length;i++) total+=parseFloat(holders[i].amount||0);
    var top1=holders.length>0?(parseFloat(holders[0].amount||0)/total):0;
    var top10=0; for(var i=0;i<Math.min(10,holders.length);i++) top10+=parseFloat(holders[i].amount||0)/(total||1);
    var res={top1pct:top1,top10pct:top10,safe:top1<0.20&&top10<0.60,ts:Date.now()};
    holderCache[mint]=res; cb(res);
  }).catch(function(){var r={top1pct:0,top10pct:0,safe:true,ts:Date.now()};holderCache[mint]=r;cb(r);});
}

function fetchSentiment(sym,mint,cb){
  if(!TOGGLES.useSentiment.on){cb({score:50,bullish:false,bearish:false,hasSocials:false});return;}
  var k=sym+'_'+mint;
  if(sentimentCache[k]&&Date.now()-sentimentCache[k].ts<180000){cb(sentimentCache[k]);return;}
  fetch('https://api.dexscreener.com/latest/dex/tokens/'+mint)
  .then(function(r){return r.json();}).then(function(d){
    var pairs=d.pairs||[],pair=null;
    for(var i=0;i<pairs.length;i++){if(pairs[i].chainId==='solana'){pair=pairs[i];break;}}
    var res={score:50,bullish:false,bearish:false,hasSocials:false,twitterUrl:null,telegramUrl:null,ts:Date.now()};
    if(pair&&pair.info){
      var soc=pair.info.socials||[];
      for(var i=0;i<soc.length;i++){if(soc[i].type==='twitter')res.twitterUrl=soc[i].url;if(soc[i].type==='telegram')res.telegramUrl=soc[i].url;}
      res.hasSocials=!!(res.twitterUrl||res.telegramUrl||(pair.info.websites&&pair.info.websites.length));
      var s=0;
      if(res.twitterUrl)s+=20;if(res.telegramUrl)s+=15;if(res.hasSocials)s+=10;
      if(pair.priceChange){var c5=pair.priceChange.m5||0,c1=pair.priceChange.h1||0;if(c5>5)s+=15;if(c1>20)s+=15;if(c5<-10)s-=20;if(c1<-30)s-=25;}
      var vol=(pair.volume&&pair.volume.h24)||0,liq=(pair.liquidity&&pair.liquidity.usd)||1;
      if(vol/liq>1)s+=15;if(vol/liq>3)s+=10;
      res.score=Math.min(100,Math.max(0,50+s));
      res.bullish=res.score>=65; res.bearish=res.score<=30;
    }
    sentimentCache[k]=res; cb(res);
  }).catch(function(){var r={score:50,bullish:false,bearish:false,hasSocials:false,ts:Date.now()};sentimentCache[k]=r;cb(r);});
}

function checkDev(mint,cb){
  if(!mint||!TOGGLES.useDevWallet.on){cb({suspicious:false,largeTransfers:0});return;}
  if(devCache[mint]&&Date.now()-devCache[mint].ts<300000){cb(devCache[mint]);return;}

  .then(function(r){return r.json();}).then(function(d){

    var res={suspicious:large>=3,largeTransfers:large,ts:Date.now()};
    devCache[mint]=res; cb(res);

}

function analyzeNewTokens(){
  for(var i=0;i<Math.min(5,newTokens.length);i++){
    var t=newTokens[i]; if(!t.mint) continue;
    var k=t.s+'_'+t.mint;
    if(rugCache[t.mint]&&holderCache[t.mint]&&sentimentCache[k]&&devCache[t.mint]) continue;
    (function(tok){
      var done=0,total=4,results={};
      function next(){done++;if(done===total){
        if(results.rug&&results.rug.honeypot){blacklistMap[tok.mint]=true;flash('🚫 HONEYPOT: '+tok.s,'#ef4444');}
        if(results.dev&&results.dev.suspicious){flash('🐋 Dev dump: '+tok.s,'#fbbf24');}

      }}
      checkRug(tok.mint,function(r){results.rug=r;next();});

      checkDev(tok.mint,function(d){results.dev=d;next();});
    })(t);
  }
}

// ═══════════════════════════════════════════════
function calcRSI(p,n){
  if(!n)n=14; if(p.length<n+1)return null;
  var g=0,l=0;
  for(var i=p.length-n;i<p.length;i++){var d=p[i]-p[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  var ag=g/n,al=l/n; if(al===0)return 100;
  return 100-(100/(1+(ag/al)));
}
function calcEMA(p,n){
  if(p.length<n)return null;
  var k=2/(n+1),e=p[p.length-n];
  for(var i=p.length-n+1;i<p.length;i++) e=p[i]*k+e*(1-k);
  return e;
}
function getTA(tok){
  if(!TOGGLES.useTA.on) return null;
  var p=tok.ph||[]; if(p.length<30)return null;
  var rsi=calcRSI(p,14), e9=calcEMA(p,9), e21=calcEMA(p,21);
  var macdLine=e9&&e21?calcEMA(p,12)-calcEMA(p,26):null;
  var cur=p[p.length-1];
  var techScore=0;
  if(rsi&&rsi>40&&rsi<65)techScore++;
  if(e9&&e21&&e9>e21)techScore++;
  if(e9&&cur>e9)techScore++;
  if(macdLine&&macdLine>0)techScore++;
  return {rsi:rsi,e9:e9,e21:e21,macd:macdLine,
    rsiOS:rsi&&rsi<35, rsiOB:rsi&&rsi>70,
    uptrend:!!(e9&&e21&&e9>e21), aboveEma:!!(e9&&cur>e9),
    macdBull:macdLine&&macdLine>0, techScore:techScore};
}

// ═══════════════════════════════════════════════
function scoreWatchlist(t){
  var vr=t.cur/(t.avg||1);
  var ref=t.ph[Math.max(0,t.ph.length-60)]||t.price;
  var p30=t.fromAPI?(t.ch1||0):(t.price-ref)/(ref||t.price);
  var win=t.ph.slice(-(CFG.brkWin+1),-1);
  var hi=Math.max.apply(null,win.length?win:[t.price]);
  var base=(vr>=CFG.volX?1:0)+(p30>=CFG.pumpPct?1:0)+(t.price>hi*1.001?1:0);
  var ta=getTA(t), bonus=0;
  if(ta){if(ta.uptrend)bonus++;if(ta.macdBull)bonus++;if(ta.rsiOS)bonus++; if(ta.rsiOB)bonus--;}
  return {sc:base,bonus:bonus,vr:vr,p30:p30,ta:ta};
}

function scoreNewToken(t){
  var sc=0;
  if(t.ch5m>0.03)sc++; if(t.ch1h>0.10)sc++; if(t.vol&&t.liq&&t.vol>t.liq*0.2)sc++;
  if(t.liq>25000)sc++; if(t.ch6h>0&&t.ch6h<5.0)sc++;
  var rug=rugCache[t.mint];
  if(rug){if(rug.honeypot)return -1;if(rug.mintAuth)sc=Math.max(0,sc-1);if(rug.score>300)sc=Math.max(0,sc-1);}
  var hld=holderCache[t.mint];
  if(hld){if(hld.top1pct>0.30)return -1;if(hld.top1pct>0.20)sc=Math.max(0,sc-1);}
  var k=t.s+'_'+t.mint, sent=sentimentCache[k];
  if(sent){if(sent.bullish)sc++;if(sent.bearish)sc=Math.max(0,sc-1);if(!sent.hasSocials)sc=Math.max(0,sc-1);}
  var dev=devCache[t.mint];
  if(dev&&dev.suspicious)sc=Math.max(0,sc-2);
  return sc;
}

function checkExit(pos,price){
  var pct=(price-pos.ep)/pos.ep;
  var dur=Date.now()-pos.ts;
  var maxMs=pos.isNew?CFG.maxMsNew:CFG.maxMs;
  var hi=Math.max(pos.hi||pos.ep,price);
  var sl=TOGGLES.useTrailSL.on?hi*(1-CFG.trail):(pos.ep*(1-CFG.trail*2));
  var rp=pos.rp||[];
  var dump=TOGGLES.useDumpDetect.on&&rp.length>=CFG.dumpTicks&&(price-rp[0])/rp[0]<=-CFG.dump;
  if(dur>=maxMs)           return {exit:true,why:'TIMEOUT',pct:pct,hi:hi,sl:sl};
  if(dump)                 return {exit:true,why:'DUMP',   pct:pct,hi:hi,sl:sl};
  if(price<=sl&&hi>pos.ep) return {exit:true,why:'TRAIL_SL',pct:pct,hi:hi,sl:sl};
  if(!pos.tp3&&pct>=CFG.tp3) return {exit:true,why:'TP3',pct:pct,hi:hi,sl:sl};
  return {exit:false,pct:pct,hi:hi,sl:sl};
}

function initMarket(){
  market=[];
  for(var i=0;i<watchlist.length;i++){
    var t=watchlist[i],b=t.b||0.001,v=t.v||1e7;
    market.push({s:t.s,e:t.e,mint:t.mint||'',b:b,v:v,price:b,prev:b,
      ph:fill(80,b),vh:fill(20,v),avg:v,cur:v,trend:1,pump:0,isPump:false,
      fromAPI:false,liq:0,ch1:0,mcap:0,isNew:false});
  }
}
function fill(n,v){var a=[];for(var i=0;i<n;i++)a.push(v);return a;}
function tickSim(){
  for(var i=0;i<market.length;i++){
    var t=market[i];
    var pump=t.pump>0?t.pump-1:0;
    if(Math.random()>0.993)pump=20+Math.floor(Math.random()*40);
    var isPump=pump>0,trend=Math.random()>0.91?-t.trend:t.trend;
    var move=(Math.random()*0.022-0.008)+trend*0.006+(isPump?Math.random()*0.035+0.008:0);
    var price=Math.max(t.price*(1+move),t.b*0.05);
    var vm=isPump?3+Math.random()*6:Math.random()>.94?2+Math.random()*2:.3+Math.random()*1.2;
    var cv=t.v*vm,vh=t.vh.slice(1);vh.push(cv);
    var avg=0;for(var j=0;j<vh.length;j++)avg+=vh[j];avg/=vh.length;
    var ph=t.ph.slice(1);ph.push(price);
    market[i].prev=t.price;market[i].price=price;market[i].ph=ph;
    market[i].vh=vh;market[i].avg=avg;market[i].cur=cv;
    market[i].trend=trend;market[i].pump=pump;market[i].isPump=isPump;
  }
}

          var ch24=((pair.priceChange&&pair.priceChange.h24)||0)/100;
          var ch6=((pair.priceChange&&pair.priceChange.h6)||0)/100;

        }
        fetched++;
        if(fetched===mints.length) computeBacktest(results);
      }).catch(function(){fetched++;if(fetched===mints.length)computeBacktest(results);});
    })(mints[i]);
  }
}

function computeBacktest(data){
  // Simulation de 7 jours de trading avec la stratégie actuelle
  // On génère des prix synthétiques basés sur les données réelles disponibles
  var cap=CFG.capital;
  var trades=[], wins=0, losses=0, totalPnl=0;
  var capHistory=[{v:cap,d:0}];
  var DAYS=7, TICKS_PER_DAY=48; // tick toutes les 30min

  for(var d=0;d<DAYS;d++){
    for(var t=0;t<TICKS_PER_DAY;t++){
      for(var i=0;i<data.length;i++){
        var tok=data[i];
        // Simuler mouvement prix basé sur volatilité réelle
        var vol24=Math.abs(tok.ch24);
        var tickMove=(Math.random()*vol24*2-vol24)/TICKS_PER_DAY;
        tickMove+=(Math.random()-0.48)*0.02; // légère tendance haussière
        tok.simPrice=(tok.simPrice||tok.price)*(1+tickMove);

        // Signal d'entrée
        if(cap>=CFG.tradeSize&&Math.random()>0.85&&tok.vol>tok.liq*0.3){
          var entry=tok.simPrice;
          // Simuler durée du trade
          var holdTicks=Math.floor(Math.random()*12)+2;
          var exitPrice=entry;
          var maxPrice=entry;
          for(var h=0;h<holdTicks;h++){
            var hm=(Math.random()*vol24*2-vol24)/TICKS_PER_DAY+(Math.random()-0.48)*0.02;
            exitPrice=exitPrice*(1+hm);
            if(exitPrice>maxPrice)maxPrice=exitPrice;
            // Trail SL
            if(TOGGLES.useTrailSL.on&&exitPrice<maxPrice*(1-CFG.trail))break;
            // TP3
            if((exitPrice-entry)/entry>=CFG.tp3)break;
          }
          var pct=(exitPrice-entry)/entry;
          var pu=CFG.tradeSize*pct;
          cap+=pu; totalPnl+=pu;
          if(pu>=0)wins++;else losses++;
          trades.push({s:tok.s,e:tok.e,pct:pct,pu:pu,day:d+1});
          capHistory.push({v:cap,d:d+(t/TICKS_PER_DAY)});
        }
      }
    }
  }

  var wr=wins+losses>0?wins/(wins+losses):0;
  var maxDD=0,peak=CFG.capital;
  for(var i=0;i<capHistory.length;i++){
    if(capHistory[i].v>peak)peak=capHistory[i].v;
    var dd=(peak-capHistory[i].v)/peak;
    if(dd>maxDD)maxDD=dd;
  }

  backtestResults={
    trades:trades, wins:wins, losses:losses,
    totalPnl:totalPnl, winRate:wr,
    finalCap:cap, maxDD:maxDD,
    capHistory:capHistory,
    profitable:totalPnl>0,
    readyForLive: wr>0.45&&totalPnl>0&&maxDD<0.25
  };
  btRunning=false;
  if(curTab==='back')renderBacktest();
}

function runSimBacktest(mints){
  // Backtesting pur simulation si pas de données API
  var simData=[];
  for(var i=0;i<TOKENS.length;i++){
    simData.push({s:TOKENS[i].s,e:TOKENS[i].e,price:TOKENS[i].b,ch24:0.15,ch6:0.05,ch1:0.02,vol:TOKENS[i].v*0.3,liq:TOKENS[i].v*0.1});
  }
  computeBacktest(simData);
}

function botTick(){
  tickN++;
  if(!market.length)return;
  // En PAPER : on utilise uniquement les prix API, jamais la simulation
  // En SIM : simulation si pas de données API
  if(MODE==='sim'&&!market[0].fromAPI) tickSim();
  // En PAPER : si pas encore de données API, on attend
  if(MODE==='paper'&&!market[0].fromAPI) return;

  // Drawdown check
  if(TOGGLES.useDrawdown.on&&capital<INIT_CAP*(1-CFG.maxDrawdown)){
    flash('⛔ DRAWDOWN MAX — Bot stoppé','#ef4444');
    toggleBot();return;
  }

  var capD=0,closed=[];

  // TP partiels
  for(var i=0;i<positions.length;i++){
    var pos=positions[i];if(pos.isPerp)continue;
    var tok=getTok(pos.s);if(!tok)continue;
    var cur=tok.price,rp=(pos.rp||[]).slice(-(CFG.dumpTicks-1));rp.push(cur);
    var hi=Math.max(pos.hi||pos.ep,cur),pct=(cur-pos.ep)/pos.ep;
    positions[i]=Object.assign({},pos,{rp:rp,hi:hi});
    if(TOGGLES.useTPPartial.on){
      if(!pos.tp1&&pct>=CFG.tp1){
        positions[i].tp1=true;var p=pos.sz*0.4*pct;capD+=pos.sz*0.4+p;positions[i].sz=pos.sz*0.6;
        flash('TP1 '+pos.s+' '+fPct(pct)+' '+fUsd(p),'#4ade80');
      }
      if(!pos.tp2&&positions[i].tp1&&pct>=CFG.tp2){
        positions[i].tp2=true;var p2=positions[i].sz*0.67*pct;capD+=positions[i].sz*0.67+p2;positions[i].sz=positions[i].sz*0.33;
        flash('TP2 '+pos.s+' '+fPct(pct)+' '+fUsd(p2),'#f59e0b');
      }
    }
  }

  // Exits
  var kept=[];
  for(var i=0;i<positions.length;i++){
    var pos=positions[i];if(pos.isPerp){kept.push(pos);continue;}
    var tok=getTok(pos.s);if(!tok){kept.push(pos);continue;}
    var ex=checkExit(pos,tok.price);
    if(ex.exit){
      var pu=pos.sz*ex.pct;capD+=pos.sz+pu;
      closed.push(Object.assign({},pos,{xp:tok.price,xts:Date.now(),pct:ex.pct,pu:pu,why:ex.why,dur:Date.now()-pos.ts}));
      var em={TP3:'🎯',DUMP:'💥',TIMEOUT:'⏱',TRAIL_SL:'📉'}[ex.why]||'·';
      flash(em+' '+ex.why+' '+pos.s+' '+fPct(ex.pct)+' '+fUsd(pu),pu>=0?'#4ade80':'#f87171');
      if(ex.why==='DUMP'&&pos.mint&&TOGGLES.useBlacklist.on)blacklistMap[pos.mint]=true;
    }else{kept.push(pos);}
  }
  positions=kept;

  if(closed.length){
    history=closed.concat(history).slice(0,100);
    for(var i=0;i<closed.length;i++){
      var c=closed[i];
      if(c.pu>=0)stats.w++;else if(c.why!=='TIMEOUT')stats.l++;
      if(c.why==='TIMEOUT')stats.to++;if(c.why==='DUMP'){stats.du=stats.du||0;stats.du++;}
      stats.pnl+=c.pu;
    }
  }
  if(capD!==0){capital+=capD;pushSnap();}

  // Entrées watchlist
  for(var i=0;i<market.length;i++){
    var tok=market[i];
    if(hasPos(tok.s)||cntSpot()>=CFG.maxPos||capital<CFG.tradeSize)break;
    var sc=scoreWatchlist(tok);
    if(sc.sc>=CFG.minScore){
      // PAPER : simuler slippage réel selon liquidité + frais tx Solana
      var slippage=0, txFee=0;
      if(MODE==='paper'){
        var liqK=(tok.liq||0)/1000;
        // Slippage inversement proportionnel à la liquidité
        slippage=liqK>100?0.005:liqK>50?0.012:liqK>20?0.025:liqK>10?0.05:0.10;
        slippage+=(Math.random()*0.01); // variance aléatoire
        txFee=0.01; // ~$0.01 frais Solana
      }
      var effectiveSize=CFG.tradeSize*(1-slippage)-txFee;
      capital-=CFG.tradeSize;pushSnap();
      var pos=mkPos(tok,effectiveSize,false);
      if(MODE==='paper'){
        pos.slippage=slippage;pos.txFee=txFee;
        pos.entryNote='Slippage: '+fPct(slippage)+' · Fee: $'+txFee.toFixed(3);
      }
      positions.push(pos);
      var label='▲ '+tok.s+' '+sc.sc+'/3'+(sc.bonus>0?' +TA':'');
      if(MODE==='paper') label+=' [slip '+fPct(slippage)+']';
      flash(label,'#38bdf8');
    }
  }

  // Entrées nouveaux tokens
  if(TOGGLES.useNewTokens.on&&Date.now()-lastNewEntry>CFG.minDelaySec*1000){
    var nc=cntNew();
    for(var i=0;i<newTokens.length;i++){
      var nt=newTokens[i];
      if(hasPos(nt.s)||nc>=CFG.maxPosNew||capital<CFG.tradeSizeNew)break;
      if(TOGGLES.useBlacklist.on&&blacklistMap[nt.mint])continue;
      var sc2=scoreNewToken(nt);
      if(sc2>=CFG.minScoreNew){
        var amt=sc2>=4?CFG.tradeSizeNew*1.5:CFG.tradeSizeNew;
        capital-=amt;pushSnap();
        var mk={s:nt.s,e:nt.e,mint:nt.mint,b:nt.price,v:nt.vol||1e6,price:nt.price,prev:nt.price,
          ph:fill(80,nt.price),vh:fill(20,nt.vol||1e6),avg:nt.vol||1e6,cur:nt.vol||1e6,
          trend:1,pump:0,isPump:false,fromAPI:true,liq:nt.liq,ch1:nt.ch1h,mcap:nt.mcap||0,isNew:true};
        market.push(mk);
        positions.push(mkPos(nt,amt,true));
        lastNewEntry=Date.now();nc++;
        flash('🔥 NEW '+nt.s+' sc:'+sc2+'/5','#f59e0b');
      }
    }
  }

  updateKPIs();render();
}

function cntSpot(){var n=0;for(var i=0;i<positions.length;i++){if(!positions[i].isPerp)n++;}return n;}
function cntNew(){var n=0;for(var i=0;i<positions.length;i++){if(positions[i].isNew&&!positions[i].isPerp)n++;}return n;}
function mkPos(tok,sz,isNew){return {s:tok.s,e:tok.e,mint:tok.mint||'',ep:tok.price,ts:Date.now(),sz:sz,hi:tok.price,rp:[tok.price],tp1:false,tp2:false,tp3:false,isNew:isNew,isPerp:false};}
function getTok(s){for(var i=0;i<market.length;i++){if(market[i].s===s)return market[i];}return null;}
function hasPos(s){for(var i=0;i<positions.length;i++){if(positions[i].s===s)return true;}return false;}
function pushSnap(){snaps=snaps.concat([{v:capital,t:Date.now()}]).slice(-300);}

// ═══════════════════════════════════════════════
// CLOSE
// ═══════════════════════════════════════════════
function closeOne(s){
  var idx=-1;for(var i=0;i<positions.length;i++){if(positions[i].s===s){idx=i;break;}}
  if(idx<0)return;
  var pos=positions[idx],tok=getTok(s),cur=tok?tok.price:pos.ep;
  var pct=(cur-pos.ep)/pos.ep,pu=pos.sz*pct;
  if(MODE==='live'){showModal('CLÔTURER '+s,'P&L estimé : '+fUsd(pu)+'\n\n⚠ Transaction RÉELLE',function(){_close1(idx,pos,cur,pct,pu);},'VENDRE');}
  else _close1(idx,pos,cur,pct,pu);
}
function _close1(idx,pos,cur,pct,pu){
  history=[Object.assign({},pos,{xp:cur,xts:Date.now(),pct:pct,pu:pu,why:'MANUAL',dur:Date.now()-pos.ts})].concat(history).slice(0,100);
  capital+=pos.sz+pu;pushSnap();positions.splice(idx,1);
  if(pu>=0)stats.w++;else stats.l++;stats.pnl+=pu;
  flash('✋ CLOSE '+pos.s+' '+fPct(pct)+' '+fUsd(pu),pu>=0?'#4ade80':'#f87171');
  updateKPIs();render();
}
function closeAll(){
  if(!positions.length)return;
  if(MODE==='live'){showModal('CLÔTURER TOUT',positions.length+' positions\n\n⚠ Transactions RÉELLES',function(){_closeAll();},'TOUT VENDRE');}
  else _closeAll();
}
function _closeAll(){
  var tot=0;
  for(var i=0;i<positions.length;i++){
    var pos=positions[i],tok=getTok(pos.s),cur=tok?tok.price:pos.ep;
    var pct=(cur-pos.ep)/pos.ep,pu=pos.sz*pct;
    history=[Object.assign({},pos,{xp:cur,xts:Date.now(),pct:pct,pu:pu,why:'MANUAL',dur:Date.now()-pos.ts})].concat(history);
    capital+=pos.sz+pu;tot+=pu;
    if(pu>=0)stats.w++;else stats.l++;stats.pnl+=pu;
  }
  history=history.slice(0,100);pushSnap();positions=[];
  flash('✋ CLOSE ALL '+fUsd(tot),tot>=0?'#4ade80':'#f87171');
  updateKPIs();render();
}

    botTimer=setInterval(botTick,2000);

    if(MODE==='live'||MODE==='paper'){
      fetchTimer=setInterval(fetchDexPrices,3000);
      newTimer=setInterval(fetchNewTokens,20000);

function updateKPIs(){
  var tpnl=capital-INIT_CAP,opnl=0;
  for(var i=0;i<positions.length;i++){var tok=getTok(positions[i].s);if(tok)opnl+=positions[i].sz*((tok.price-positions[i].ep)/positions[i].ep);}
  var wr=(stats.w+stats.l)>0?Math.round(stats.w/(stats.w+stats.l)*100):null;
  document.getElementById('kCap').textContent='$'+capital.toFixed(0);
  var pe=document.getElementById('kPnl');pe.textContent=(tpnl>=0?'+':'')+' $'+Math.abs(tpnl).toFixed(1);pe.style.color=tpnl>=0?'#4ade80':'#f87171';
  document.getElementById('kOpen').textContent=(opnl>=0?'+':'')+' $'+Math.abs(opnl).toFixed(1);
  document.getElementById('kWin').textContent=wr!==null?wr+'%':'--%';
  var ca=document.getElementById('btnCA');
  if(positions.length){ca.style.display='';ca.textContent='✕ ALL ('+positions.length+')';ca.onclick=function(){closeAll();};}
  else ca.style.display='none';
}

function renderLive(){
  var nc=cntNew();
  var modeColor=MODE==='paper'?'#38bdf8':MODE==='live'?'#4ade80':'#f59e0b';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div style="font-size:8px;color:#334155;letter-spacing:2px">POSITIONS ('+positions.length+'/'+CFG.maxPos+') · <span style="color:'+modeColor+'">'+MODE.toUpperCase()+'</span> · <span style="color:#f59e0b">'+currentProfile.toUpperCase()+'</span></div>';
  if(MODE==='paper') h+='<div style="font-size:7px;padding:2px 6px;border-radius:4px;background:rgba(56,189,248,.08);border:1px solid #0c4a6e;color:#38bdf8">📋 Données réelles · 0 transaction</div>';
  h+='</div>';
  if(nc>0)h+='<div style="font-size:7px;color:#f59e0b;margin-bottom:5px">🔥 '+nc+' nouveau(x) token(s) · $'+CFG.tradeSizeNew+'/trade</div>';

  if(!positions.length){
    h+='<div style="text-align:center;padding:34px 14px;color:#1e293b;font-size:10px;border:1px dashed #0f172a;border-radius:10px">';
    h+=running?'<div style="font-size:22px;margin-bottom:7px;animation:blink 1s infinite">◉</div>Scanning…':'Démarre le bot';
    h+='</div>';
  }

  for(var i=0;i<positions.length;i++){
    var pos=positions[i];if(pos.isPerp)continue;
    var tok=getTok(pos.s),cur=tok?tok.price:pos.ep;
    var pct=(cur-pos.ep)/pos.ep,pu=pos.sz*pct;
    var ex=checkExit(pos,cur),dur=Date.now()-pos.ts;
    var maxMs=pos.isNew?CFG.maxMsNew:CFG.maxMs;
    var tleft=Math.max(0,maxMs-dur),tpct=1-tleft/maxMs;

function quickBuy(idx){
  var t=newTokens[idx];if(!t)return;
  if(capital<CFG.tradeSizeNew){flash('Capital insuffisant','#f87171');return;}
  if(hasPos(t.s)){flash(t.s+' déjà ouvert','#f87171');return;}
  var sc=scoreNewToken(t),amt=sc>=4?CFG.tradeSizeNew*1.5:CFG.tradeSizeNew;
  if(MODE==='live'){
    showModal('ACHETER '+t.s,'Prix $'+fP(t.price)+'\nLiq '+fVol(t.liq)+'\nScore '+sc+'/5\nMontant $'+amt.toFixed(0)+'\n\n⚠ RISQUE ÉLEVÉ — Transaction RÉELLE',function(){_buyNew(t,amt);},'ACHETER $'+amt.toFixed(0));
  }else _buyNew(t,amt);
}
function _buyNew(t,amt){
  capital-=amt;pushSnap();
  var mk={s:t.s,e:t.e,mint:t.mint,b:t.price,v:t.vol||1e6,price:t.price,prev:t.price,
    ph:fill(80,t.price),vh:fill(20,t.vol||1e6),avg:t.vol||1e6,cur:t.vol||1e6,
    trend:1,pump:0,isPump:false,fromAPI:true,liq:t.liq,ch1:t.ch1h,mcap:t.mcap||0,isNew:true};
  market.push(mk);
  positions.push(mkPos(t,amt,true));
  lastNewEntry=Date.now();
  flash('⚡ BUY '+t.s+' $'+amt.toFixed(0),'#f59e0b');
  updateKPIs();setTab('live');
}

function renderBacktest(){
  var h='<div style="font-size:8px;color:#334155;letter-spacing:2px;margin-bottom:10px">📊 BACKTESTING 7 JOURS</div>';

  if(!backtestResults&&!btRunning){
    h+='<div style="margin-bottom:10px;padding:10px;background:rgba(255,255,255,.02);border:1px solid #0f172a;border-radius:8px;font-size:8px;color:#64748b;line-height:1.6">';
    h+='Le backtesting simule 7 jours de trading avec tes paramètres actuels. Il utilise les données de prix réelles DexScreener combinées à une simulation de volatilité pour estimer la rentabilité.\n\nCe n\'est pas une garantie de performance future.</div>';
    h+='<button onclick="runBacktest()" style="width:100%;padding:12px;background:rgba(56,189,248,.1);border:1px solid #0c4a6e;color:#38bdf8;border-radius:8px;font-family:\'Bebas Neue\';font-size:16px;letter-spacing:2px">▶ LANCER LE BACKTEST</button>';
    h+='<div style="margin-top:10px;padding:9px;background:rgba(255,255,255,.02);border:1px solid #0f172a;border-radius:7px">';
    h+='<div style="font-size:7px;color:#64748b;letter-spacing:1px;margin-bottom:6px">PARAMÈTRES TESTÉS</div>';
    var params=[['Profil',currentProfile.toUpperCase()],['TP3',fPct(CFG.tp3)],['Trail SL',fPct(CFG.trail)],['Taille trade','$'+CFG.tradeSize],['Drawdown max',fPct(CFG.maxDrawdown)]];
    for(var i=0;i<params.length;i++) h+='<div style="display:flex;justify-content:space-between;font-size:7px;padding:3px 0;border-bottom:1px solid #0f172a"><span style="color:#475569">'+params[i][0]+'</span><span style="color:#94a3b8">'+params[i][1]+'</span></div>';
    h+='</div>';
    document.getElementById('content').innerHTML=h;return;
  }

  if(btRunning){
    h+='<div style="text-align:center;padding:40px;color:#38bdf8;font-size:11px">';
    h+='<div style="font-size:24px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:10px">⊙</div><br>Simulation en cours…<br><div style="font-size:8px;color:#334155;margin-top:6px">Récupération données DexScreener + simulation 7j</div>';
    h+='</div>';
    document.getElementById('content').innerHTML=h;return;
  }

  var r=backtestResults;
  var pnlPct=(r.finalCap-CFG.capital)/CFG.capital;

  // Score global
  var score=0;
  if(r.winRate>=0.45)score+=25;if(r.winRate>=0.55)score+=15;
  if(r.totalPnl>0)score+=25;if(pnlPct>0.05)score+=10;
  if(r.maxDD<0.20)score+=15;if(r.maxDD<0.10)score+=10;
  var scoreColor=score>=70?'#4ade80':score>=50?'#fbbf24':'#f87171';
  var scoreLabel=score>=70?'PRÊT POUR LE LIVE':score>=50?'RÉSULTATS MIXTES':'TROP RISQUÉ';

  // Verdict box
  h+='<div style="padding:12px;border-radius:10px;margin-bottom:12px;background:'+(r.profitable?'rgba(74,222,128,.05)':'rgba(239,68,68,.05)')+';border:1px solid '+(r.profitable?'#166534':'#7f1d1d')+'">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div style="font-family:\'Bebas Neue\';font-size:16px;letter-spacing:2px;color:'+scoreColor+'">'+scoreLabel+'</div>';
  h+='<div style="font-size:22px;font-weight:800;color:'+scoreColor+'">'+score+'/100</div></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  var metrics=[
    ['P&L 7j',(r.totalPnl>=0?'+':'')+' $'+Math.abs(r.totalPnl).toFixed(2),r.totalPnl>=0?'#4ade80':'#f87171'],
    ['Capital final','$'+r.finalCap.toFixed(2),r.finalCap>=CFG.capital?'#4ade80':'#f87171'],
    ['Win Rate',(r.winRate*100).toFixed(0)+'%',r.winRate>=0.45?'#4ade80':'#f87171'],
    ['Max Drawdown',fPct(r.maxDD),r.maxDD<0.20?'#4ade80':'#f87171'],
    ['Trades',r.trades.length,'#e2e8f0'],
    ['Gains/Pertes',r.wins+' / '+r.losses,r.wins>r.losses?'#4ade80':'#f87171'],
  ];
  for(var i=0;i<metrics.length;i++){
    h+='<div style="background:rgba(255,255,255,.02);border-radius:5px;padding:6px 7px">';
    h+='<div style="font-size:6px;color:#334155;margin-bottom:2px">'+metrics[i][0]+'</div>';
    h+='<div style="font-size:12px;font-weight:700;color:'+metrics[i][2]+'">'+metrics[i][1]+'</div></div>';
  }
  h+='</div></div>';

  // Courbe capital backtest
  if(r.capHistory&&r.capHistory.length>=2){

    var poly=pts.map(function(p){return p[0]+','+p[1];}).join(' ');

    h+='<div style="background:rgba(255,255,255,.02);border:1px solid #0f172a;border-radius:8px;padding:10px 11px;margin-bottom:10px">';
    h+='<div style="font-size:7px;color:#334155;letter-spacing:2px;margin-bottom:7px">COURBE SIMULÉE 7 JOURS</div>';
    h+='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block"><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".2"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><polyline points="'+fill2+'" fill="url(#bg)" stroke="none"/><polyline points="'+poly+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/></svg>';
    h+='<div style="display:flex;justify-content:space-between;font-size:7px;color:#334155;margin-top:3px"><span>Jour 1 · $'+vals[0].toFixed(0)+'</span><span style="color:'+col+'">Jour 7 · $'+vals[vals.length-1].toFixed(2)+'</span></div>';
    h+='</div>';
  }

  // Recommandations
  h+='<div style="padding:9px 10px;background:rgba(255,255,255,.02);border:1px solid #0f172a;border-radius:7px;margin-bottom:10px">';
  h+='<div style="font-size:7px;color:#64748b;letter-spacing:1px;margin-bottom:6px">RECOMMANDATIONS</div>';
  var recs=[];
  if(r.winRate<0.45)recs.push({t:'Win rate < 45%',d:'Augmente le score minimum ou passe en profil SAFE',c:'#f87171'});
  if(r.maxDD>0.20)recs.push({t:'Drawdown élevé',d:'Réduis la taille des trades ou le drawdown max dans les settings',c:'#f87171'});
  if(r.totalPnl>0&&r.winRate>=0.45)recs.push({t:'Résultats positifs',d:'Continue en simulation 2 semaines avant le live',c:'#4ade80'});
  if(r.totalPnl>CFG.capital*0.05)recs.push({t:'+5% en 7 jours',d:'Performance solide — peut envisager le live avec $100',c:'#4ade80'});
  if(!recs.length)recs.push({t:'Résultats neutres',d:'Continue la simulation, ajuste les paramètres',c:'#fbbf24'});
  for(var i=0;i<recs.length;i++){
    h+='<div style="padding:5px 0;border-bottom:1px solid #0f172a"><div style="font-size:8px;color:'+recs[i].c+'">'+recs[i].t+'</div><div style="font-size:7px;color:#475569;margin-top:1px">'+recs[i].d+'</div></div>';

function openPerp(asset,dir){
  if(capital<CFG.perpSize){flash('Capital insuffisant','#f87171');return;}
  if(hasPos('PERP-'+asset)){flash('Position déjà ouverte','#f87171');return;}
  var price=perpPrices[asset]||{SOL:150,BTC:65000,ETH:3500}[asset]||100;
  showModal((dir==='long'?'▲ LONG ':'▼ SHORT ')+asset+' ×'+CFG.perpLeverage,
    'Prix entrée : $'+price.toFixed(0)+'\nTaille : $'+CFG.perpSize+'\nExposition : $'+(CFG.perpSize*CFG.perpLeverage).toFixed(0)+'\nTP : $'+(price*(1+(dir==='long'?CFG.perpTP:-CFG.perpTP))).toFixed(0)+'\nSL : $'+(price*(1-(dir==='long'?CFG.perpSL:-CFG.perpSL))).toFixed(0)+'\n\n'+(MODE==='live'?'⚠ Transaction RÉELLE Jupiter Perps':'MODE SIMULATION'),
    function(){
      capital-=CFG.perpSize;pushSnap();
      positions.push({s:'PERP-'+asset,e:{SOL:'◎',BTC:'₿',ETH:'Ξ'}[asset]||'⚡',mint:'',ep:price,ts:Date.now(),sz:CFG.perpSize,direction:dir,hi:price,rp:[],tp1:false,tp2:false,tp3:false,isNew:false,isPerp:true});
      updateKPIs();flash((dir==='long'?'▲ LONG ':'▼ SHORT ')+asset+' ×'+CFG.perpLeverage,dir==='long'?'#4ade80':'#f87171');render();
    },(dir==='long'?'▲ OUVRIR LONG':'▼ OUVRIR SHORT'));
}

function closePerp(asset){
  var idx=-1;for(var i=0;i<positions.length;i++){if(positions[i].s==='PERP-'+asset&&positions[i].isPerp){idx=i;break;}}
  if(idx<0)return;
  var pos=positions[idx],cp=perpPrices[asset]||pos.ep;
  var raw=(cp-pos.ep)/pos.ep*(pos.direction==='long'?1:-1),lev=raw*CFG.perpLeverage,pu=pos.sz*lev;
  showModal('CLÔTURER PERP '+asset,'P&L estimé : '+fUsd(pu)+' ('+fPct(lev)+')\n\n'+(MODE==='live'?'⚠ Transaction RÉELLE':'SIMULATION'),
    function(){
      history=[Object.assign({},pos,{xp:cp,xts:Date.now(),pct:lev,pu:pu,why:'MANUAL',dur:Date.now()-pos.ts,isPerp:true})].concat(history).slice(0,100);
      capital+=pos.sz+pu;pushSnap();positions.splice(idx,1);
      if(pu>=0)stats.w++;else stats.l++;stats.pnl+=pu;
      flash('✋ CLOSE PERP '+asset+' '+fUsd(pu),pu>=0?'#4ade80':'#f87171');
      updateKPIs();render();
    },'CLÔTURER');
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function showModal(title,body,onConfirm,label){
  document.getElementById('mT').textContent=title;document.getElementById('mB').textContent=body;
  var btn=document.getElementById('mOk');btn.textContent=label||'OK';
  if(onConfirm){btn.style.display='';modalCb=onConfirm;btn.onclick=function(){if(modalCb)modalCb();closeModal();};}
  else btn.style.display='none';
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';modalCb=null;}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fP(p){
  if(!p||isNaN(p))return '0';
  if(p<.000001)return p.toExponential(2);if(p<.0001)return p.toFixed(7);
  if(p<.01)return p.toFixed(5);if(p<1)return p.toFixed(4);return p.toFixed(3);
}
function fPct(p,plus){if(plus===undefined)plus=true;return (p>=0&&plus?'+':'')+(p*100).toFixed(1)+'%';}
function fUsd(n){return (n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function fTime(ts){return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fMs(ms){return ms<1000?ms+'ms':ms<60000?(ms/1000).toFixed(0)+'s':(ms/60000).toFixed(1)+'m';}
function fVol(v){return !v?'$0':v>=1e9?'$'+(v/1e9).toFixed(1)+'B':v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':'$'+Math.round(v);}

var flashTm=null;
function flash(msg,color){
  var el=document.getElementById('flash');
  el.textContent=msg;el.style.color=color;el.style.border='1px solid '+color;
  el.style.background='rgba(8,12,20,.95)';el.style.boxShadow='0 0 12px '+color+'40';
  el.style.display='';el.style.animation='none';el.offsetWidth;
  el.style.animation='fa 2s ease forwards';
  clearTimeout(flashTm);flashTm=setTimeout(function(){el.style.display='none';},2200);
}

// ═══════════════════════════════════════════════
// SAUVEGARDE LOCALE (survit au refresh)
// ═══════════════════════════════════════════════
var SAVE_KEY = 'scalpbot_state_v1';
var saveTimer = null;

function saveState(){
  try {
    var state = {
      capital: capital,
      positions: positions,
      history: history,
      stats: stats,
      snaps: snaps.slice(-100), // garder les 100 derniers points
      MODE: MODE,
      currentProfile: currentProfile,
      CFG: CFG,
      TOGGLES: TOGGLES,
      INIT_CAP: INIT_CAP,
      ts: Date.now()
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function loadState(){
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    var state = JSON.parse(raw);
    // Ne restaurer que si moins de 24h
    if(Date.now() - state.ts > 86400000) {
      localStorage.removeItem(SAVE_KEY);
      return false;
    }
    capital   = state.capital   || CFG.capital;
    positions = state.positions || [];
    history   = state.history   || [];
    stats     = state.stats     || {w:0,l:0,to:0,du:0,pnl:0};
    snaps     = state.snaps     || [{v:capital,t:Date.now()}];
    INIT_CAP  = state.INIT_CAP  || CFG.capital;
    if(state.MODE)           MODE = state.MODE;
    if(state.currentProfile) currentProfile = state.currentProfile;
    if(state.CFG)            Object.assign(CFG, state.CFG);
    if(state.TOGGLES){
      for(var k in state.TOGGLES){
        if(TOGGLES[k]) TOGGLES[k].on = state.TOGGLES[k].on;
      }
    }
    flash('✓ Session restaurée — '+history.length+' trades · $'+capital.toFixed(2),'#4ade80');
    return true;
  } catch(e) { return false; }
}

function resetState(){
  localStorage.removeItem(SAVE_KEY);
  capital = CFG.capital; INIT_CAP = CFG.capital;
  positions = []; history = []; stats = {w:0,l:0,to:0,du:0,pnl:0};
  snaps = [{v:CFG.capital,t:Date.now()}];
  updateKPIs(); render();
  flash('🔄 Session réinitialisée','#f59e0b');
}

// Auto-save toutes les 5 secondes
function startAutoSave(){
  saveTimer = setInterval(saveState, 5000);
}
